packages:
  - "apps/*"
  - "packages/*"

# One React types version across the workspace.
#
# Expo pins ~19.1.10 and Next wants ^19; pnpm resolved both, and two copies of
# @types/react make JSX types structurally incompatible -- a valid <svg> in the
# website suddenly fails to typecheck because it is checked against the other
# copy's SVGProps. The error points at the component and says nothing about
# versions, so it costs an hour to diagnose.
#
# 19.1.17 (not 19.1.0): satisfies Expo's ~19.1.10 floor so expo-doctor passes,
# and Next builds fine on it. The exact patch does not matter -- being single
# does. Bumping past 19.1.x would break Expo's pin, so stay on 19.1.x.
overrides:
  "@types/react": "19.1.17"

# services/ai is Python. It stays out of the pnpm workspace on purpose: it has
# its own pyproject.toml and does not belong in the Turborepo build graph.

# pnpm blocks dependency build scripts by default -- a barrier against supply
# chain attacks, where a compromised package runs arbitrary code on install.
# Each `true` below is a deliberate authorization; nothing outside this list
# executes.
#
# NOTE: pnpm rewrites this file on install and mangles non-ASCII, so keep the
# comments here in ASCII.
allowBuilds:
  # Native image binary. Used by next/image and the brand export script.
  sharp: true
  # Fetch the Prisma engines. The client cannot be generated without them.
  prisma: true
  "@prisma/engines": true
  # Native SWC binary -- this is Next's compiler.
  "@swc/core": true
  # ESLint's native resolver.
  unrs-resolver: true
  # Turborepo's file watcher.
  "@parcel/watcher": true
  # Native bundler binary. Vitest uses it to transform TypeScript.
  esbuild: true
